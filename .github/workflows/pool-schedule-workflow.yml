name: Update Pool Schedule

permissions:
  contents: write

on:
  schedule:
    # Run daily at 6 AM Calgary time (1 PM UTC, accounting for daylight saving)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Fetch and generate schedule
        run: python3 pool_schedule_ical.py
        continue-on-error: true
      
      - name: Configure git
        run: |
          git config user.name "Pool Schedule Bot"
          git config user.email "action@github.com"
      
      - name: Commit debug HTML
        run: |
          git add schedule_debug.html || true
          git commit -m "DEBUG: Schedule HTML dump - $(date -u +'%Y-%m-%d %H:%M UTC')" || true
          git push || true
      
      - name: Check if schedule changed or is new
        id: check_changes
        run: |
          # Add the file to git so we can check if it changed
          git add pool-schedule.ics
          
          if git diff --quiet --cached pool-schedule.ics; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to schedule"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Schedule has been updated"
          fi
      
      - name: Commit and push schedule changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git commit -m "Update pool schedule - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
